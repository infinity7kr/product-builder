<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="상황, 시간, 관심 분야, 목표 수익, 초기 비용, 업무 스타일, 수익화 속도를 선택해 나에게 맞는 부업 아이디어를 추천받는 사이트입니다.">
  <title>나에게 딱 맞는 부업 찾기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f6;
      --panel: #ffffff;
      --panel-soft: #f9fbfa;
      --text: #1f2933;
      --muted: #667085;
      --line: #dce5e1;
      --primary: #4caf50;
      --primary-dark: #3f9143;
      --accent: #ecf8ee;
      --shadow: 0 18px 55px rgba(31, 41, 51, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(76, 175, 80, 0.18), transparent 32rem),
        var(--bg);
    }

    main {
      width: min(100%, 680px);
      margin: 0 auto;
      padding: 28px 0;
    }

    .container {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .header {
      display: grid;
      gap: 10px;
      padding: 30px;
      text-align: center;
      background: linear-gradient(135deg, rgba(76, 175, 80, 0.16), rgba(236, 248, 238, 0.78));
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      color: #233128;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.65;
    }

    .form {
      display: grid;
      gap: 20px;
      padding: 30px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    label {
      color: #435044;
      font-weight: 800;
    }

    select,
    button {
      width: 100%;
      min-height: 48px;
      border-radius: 8px;
      font: inherit;
      font-size: 1rem;
    }

    select {
      padding: 0 14px;
      color: var(--text);
      background: #ffffff;
      border: 1px solid var(--line);
    }

    button {
      margin-top: 4px;
      color: #ffffff;
      background: var(--primary);
      border: 0;
      cursor: pointer;
      font-weight: 800;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .result-card {
      padding: 18px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-left: 4px solid var(--primary);
      border-radius: 8px;
    }

    .result-title {
      margin-bottom: 7px;
      color: #1f2a22;
      font-size: 1.1rem;
      font-weight: 900;
      line-height: 1.45;
    }

    .result-desc {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.65;
    }

    @media (max-width: 560px) {
      body {
        padding: 10px;
      }

      main {
        padding: 0;
      }

      .header,
      .form {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="container" aria-labelledby="page-title">
      <header class="header">
        <h1 id="page-title">나에게 딱 맞는 부업 찾기</h1>
        <p class="subtitle">7가지 질문에 답하면 지금 시작하기 좋은 부업 아이디어를 추천해 드립니다.</p>
      </header>

      <div class="form">
        <div class="form-group">
          <label for="userType">1. 현재 당신의 상황은?</label>
          <select id="userType">
            <option value="직장인">직장인 (본업 유지형)</option>
            <option value="육아맘">육아맘 (육아 병행형)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="time">2. 하루에 부업에 투자할 수 있는 시간은?</label>
          <select id="time">
            <option value="자투리">자투리 시간 (30분 내외)</option>
            <option value="1_2시간">하루 1~2시간</option>
            <option value="주말">주말 집중</option>
          </select>
        </div>

        <div class="form-group">
          <label for="interest">3. 가장 흥미를 느끼거나 자신 있는 분야는?</label>
          <select id="interest">
            <option value="글쓰기">글쓰기 / 블로그</option>
            <option value="디자인">디자인 / 창작</option>
            <option value="지식공유">지식 / 경험 공유</option>
            <option value="단순작업">단순 반복 / 데이터 수집</option>
          </select>
        </div>

        <div class="form-group">
          <label for="goal">4. 부업으로 원하는 월 수익 목표는?</label>
          <select id="goal">
            <option value="소액">월 10만 원 이하 소액</option>
            <option value="중간">월 30만~100만 원</option>
            <option value="확장">월 100만 원 이상 확장</option>
          </select>
        </div>

        <div class="form-group">
          <label for="budget">5. 시작할 때 쓸 수 있는 초기 비용은?</label>
          <select id="budget">
            <option value="없음">거의 없음</option>
            <option value="소액">10만 원 이하</option>
            <option value="투자">장비/강의 등에 투자 가능</option>
          </select>
        </div>

        <div class="form-group">
          <label for="workStyle">6. 선호하는 업무 방식은?</label>
          <select id="workStyle">
            <option value="혼자">혼자 조용히 작업</option>
            <option value="소통">고객/커뮤니티와 소통</option>
            <option value="제작">콘텐츠나 상품 제작</option>
            <option value="반복">정해진 일을 반복 수행</option>
          </select>
        </div>

        <div class="form-group">
          <label for="speed">7. 수익이 나기까지 기다릴 수 있는 기간은?</label>
          <select id="speed">
            <option value="빠름">가능하면 빠르게</option>
            <option value="보통">1~3개월 정도</option>
            <option value="장기">6개월 이상도 가능</option>
          </select>
        </div>

        <button type="button" id="recommendButton">결과 확인하기</button>

        <div class="results" id="resultContainer" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    const sideHustles = [
      {
        type: ["직장인", "육아맘"],
        time: ["1_2시간", "주말"],
        interest: ["글쓰기", "지식공유"],
        goal: ["중간", "확장"],
        budget: ["없음", "소액"],
        workStyle: ["혼자", "제작"],
        speed: ["보통", "장기"],
        title: "전문 분야 네이버 블로그 / 티스토리 운영",
        desc: "퇴근 후 본인의 직무 지식이나 취미를 글로 풀어내어 애드포스트 및 애드센스 수익을 창출합니다."
      },
      {
        type: ["직장인"],
        time: ["1_2시간", "주말"],
        interest: ["지식공유", "글쓰기"],
        goal: ["중간", "확장"],
        budget: ["없음", "소액"],
        workStyle: ["소통", "제작"],
        speed: ["보통"],
        title: "크몽 / 숨고 직무 컨설팅 및 전자책 출판",
        desc: "본업의 노하우(이력서 작성, 엑셀 활용법 등)를 문서화하여 주말에 컨설팅하거나 전자책으로 판매합니다."
      },
      {
        type: ["육아맘", "직장인"],
        time: ["1_2시간", "주말"],
        interest: ["디자인"],
        goal: ["중간", "확장"],
        budget: ["소액", "투자"],
        workStyle: ["제작", "혼자"],
        speed: ["보통", "장기"],
        title: "아이패드 드로잉 (이모티콘 & 굿노트 서식)",
        desc: "아이가 낮잠 자는 시간을 활용해 템플릿이나 캐릭터를 그리고 엣시(Etsy)나 카카오에 제안합니다."
      },
      {
        type: ["육아맘", "직장인"],
        time: ["자투리"],
        interest: ["단순작업"],
        goal: ["소액"],
        budget: ["없음"],
        workStyle: ["반복", "혼자"],
        speed: ["빠름"],
        title: "데이터 라벨링 & 앱테크",
        desc: "크라우드웍스 등에서 모바일로 짧은 시간에 할 수 있는 사진 촬영, 음성 녹음 등의 작업을 수행합니다."
      },
      {
        type: ["육아맘"],
        time: ["자투리", "1_2시간"],
        interest: ["글쓰기"],
        goal: ["소액", "중간"],
        budget: ["없음", "소액"],
        workStyle: ["소통", "제작"],
        speed: ["보통"],
        title: "육아/생활 정보 맘카페 제휴 마케터",
        desc: "직접 사용해 본 육아용품을 리뷰하며 쿠팡 파트너스 등의 제휴 링크를 통해 수익을 얻습니다."
      },
      {
        type: ["직장인", "육아맘"],
        time: ["자투리", "1_2시간"],
        interest: ["디자인", "단순작업"],
        goal: ["소액", "중간"],
        budget: ["없음", "소액"],
        workStyle: ["제작", "혼자"],
        speed: ["보통"],
        title: "캔바 템플릿 제작 및 판매",
        desc: "SNS 카드뉴스, 발표 자료, 체크리스트 템플릿을 만들어 크몽, 탈잉, 엣시 등에서 디지털 상품으로 판매합니다."
      },
      {
        type: ["직장인"],
        time: ["주말", "1_2시간"],
        interest: ["지식공유"],
        goal: ["확장", "중간"],
        budget: ["소액", "투자"],
        workStyle: ["소통"],
        speed: ["장기", "보통"],
        title: "온라인 강의 / 라이브 클래스",
        desc: "직무 경험이나 실무 스킬을 커리큘럼으로 정리해 클래스 플랫폼, Zoom 강의, 사내 교육 형태로 확장합니다."
      },
      {
        type: ["육아맘", "직장인"],
        time: ["자투리", "1_2시간"],
        interest: ["단순작업", "글쓰기"],
        goal: ["소액", "중간"],
        budget: ["없음"],
        workStyle: ["반복", "혼자"],
        speed: ["빠름", "보통"],
        title: "쇼핑몰 상품 등록 / 상세페이지 보조",
        desc: "스마트스토어 판매자의 상품명 정리, 이미지 업로드, 옵션 입력 같은 반복 업무를 재택으로 수행합니다."
      }
    ];

    const resultContainer = document.querySelector("#resultContainer");
    const recommendButton = document.querySelector("#recommendButton");

    function createResultCard(title, desc) {
      const card = document.createElement("article");
      card.className = "result-card";

      const heading = document.createElement("div");
      heading.className = "result-title";
      heading.textContent = title;

      const description = document.createElement("div");
      description.className = "result-desc";
      description.textContent = desc;

      card.append(heading, description);
      return card;
    }

    function recommendHustle() {
      const answers = {
        type: document.querySelector("#userType").value,
        time: document.querySelector("#time").value,
        interest: document.querySelector("#interest").value,
        goal: document.querySelector("#goal").value,
        budget: document.querySelector("#budget").value,
        workStyle: document.querySelector("#workStyle").value,
        speed: document.querySelector("#speed").value
      };

      const matches = sideHustles
        .map((item) => {
          const score = Object.entries(answers).reduce((total, [key, value]) => (
            total + (item[key].includes(value) ? 1 : 0)
          ), 0);

          return { ...item, score };
        })
        .filter((item) => item.score >= 3)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

      resultContainer.replaceChildren();

      if (matches.length > 0) {
        matches.forEach((match) => {
          resultContainer.append(createResultCard(`💡 ${match.title}`, `${match.desc} 선택 조건과 ${match.score}개 항목이 맞습니다.`));
        });
        return;
      }

      resultContainer.append(createResultCard(
        "🔍 조금 더 유연한 조건이 필요해요!",
        "선택하신 조합에 딱 맞는 부업을 찾고 있습니다. 조건을 조금 변경해 보시거나, 가장 인기 있는 '블로그 수익화'부터 시작해 보는 것은 어떨까요?"
      ));
    }

    recommendButton.addEventListener("click", recommendHustle);
  </script>
</body>
</html>
