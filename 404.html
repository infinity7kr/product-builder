<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#2f8f46">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>페이지를 찾을 수 없습니다 | 부업 맞춤 가이드</title>
  <style>
    * { box-sizing: border-box; }
    body { display: grid; min-height: 100vh; margin: 0; place-items: center; padding: 24px; color: #1f2933; background: #f4f7f6; font-family: Pretendard, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif; }
    main { width: min(620px, 100%); padding: 44px; text-align: center; background: #fff; border: 1px solid #dce5e1; border-radius: 14px; box-shadow: 0 18px 55px rgba(31, 41, 51, .1); }
    .code { margin: 0; color: #2f8f46; font-size: 4rem; font-weight: 900; }
    h1 { margin: 8px 0 14px; }
    p { margin: 0 0 26px; color: #667085; line-height: 1.7; }
    a { display: inline-block; padding: 13px 20px; color: #fff; background: #2f8f46; border-radius: 8px; font-weight: 800; text-decoration: none; }
    a:focus-visible { outline: 3px solid #203126; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <p class="code" aria-hidden="true">404</p>
    <h1>요청한 페이지를 찾을 수 없습니다</h1>
    <p>주소가 변경되었거나 삭제된 페이지입니다. 메인 페이지에서 부업 추천 도구와 현실적인 시작 가이드를 확인해 보세요.</p>
    <a href="/product-builder/">부업 추천 메인으로 이동</a>
  </main>
</body>
</html>
