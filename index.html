<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Generate random lottery numbers from 1 to 45 with duplicate-free draws, copyable results, and light or dark mode.">
  <title>Lottery Number Generator</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #eef4ff;
      --text: #182230;
      --muted: #667085;
      --line: #d6e0ef;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #0f9f6e;
      --shadow: 0 18px 55px rgba(24, 34, 48, 0.12);
    }

    body.dark {
      color-scheme: dark;
      --bg: #111827;
      --panel: #1f2937;
      --panel-soft: #263449;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: #334155;
      --primary: #60a5fa;
      --primary-dark: #3b82f6;
      --success: #34d399;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 34rem),
        var(--bg);
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .app {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .header {
      display: grid;
      gap: 18px;
      padding: 34px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(15, 159, 110, 0.08));
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button,
    select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font: inherit;
    }

    button {
      padding: 0 18px;
      color: var(--text);
      background: var(--panel);
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
    }

    button:active {
      transform: translateY(0);
    }

    .primary {
      color: #ffffff;
      background: var(--primary);
      border-color: var(--primary);
      font-weight: 700;
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    select {
      padding: 0 40px 0 14px;
      color: var(--text);
      background: var(--panel);
    }

    .body {
      display: grid;
      gap: 22px;
      padding: 28px 34px 34px;
    }

    .machine {
      display: grid;
      gap: 18px;
      justify-items: center;
      padding: 28px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .draw-display {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      min-height: 62px;
    }

    .ball {
      display: inline-grid;
      width: 52px;
      height: 52px;
      place-items: center;
      border-radius: 999px;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 800;
      box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.14), 0 8px 16px rgba(0, 0, 0, 0.12);
      animation: pop 0.22s ease both;
    }

    .ball.pending {
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line);
      box-shadow: none;
      animation: pulse 1s ease-in-out infinite;
    }

    .yellow { background: #f2b720; }
    .blue { background: #3b82f6; }
    .red { background: #ef4444; }
    .gray { background: #64748b; }
    .green { background: #10b981; }

    .results {
      display: grid;
      gap: 12px;
    }

    .game {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 14px;
      align-items: center;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .game-title {
      color: var(--muted);
      font-weight: 800;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status {
      min-height: 24px;
      margin: 0;
      color: var(--success);
      font-weight: 700;
      text-align: center;
    }

    .empty {
      padding: 26px;
      color: var(--muted);
      text-align: center;
      background: var(--panel-soft);
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    @keyframes pop {
      from {
        transform: translateY(8px) scale(0.85);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      50% {
        transform: scale(1.05);
      }
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 18px, 960px);
        padding: 9px 0;
      }

      .header,
      .body {
        padding: 22px;
      }

      .topbar,
      .controls {
        align-items: stretch;
        flex-direction: column;
      }

      button,
      select {
        width: 100%;
      }

      .game {
        grid-template-columns: 1fr;
      }

      .ball {
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app" aria-labelledby="page-title">
      <header class="header">
        <div class="topbar">
          <h1 id="page-title">Lottery Number Generator</h1>
          <button type="button" id="themeButton" aria-pressed="false">Dark mode</button>
        </div>
        <p class="subtitle">Generate six unique numbers from 1 to 45. Choose how many games to create, then draw sorted results instantly.</p>
        <div class="controls" aria-label="Draw settings">
          <select id="gameCount" aria-label="Number of games">
            <option value="1">1 game</option>
            <option value="3">3 games</option>
            <option value="5" selected>5 games</option>
            <option value="10">10 games</option>
          </select>
          <button type="button" class="primary" id="drawButton">Draw numbers</button>
          <button type="button" id="copyButton">Copy results</button>
          <button type="button" id="resetButton">Reset</button>
        </div>
      </header>

      <div class="body">
        <section class="machine" aria-label="Latest draw numbers">
          <div class="draw-display" id="drawDisplay" aria-live="polite">
            <span class="ball pending">?</span>
            <span class="ball pending">?</span>
            <span class="ball pending">?</span>
            <span class="ball pending">?</span>
            <span class="ball pending">?</span>
            <span class="ball pending">?</span>
          </div>
          <p class="status" id="status"></p>
        </section>

        <section class="results" id="results" aria-label="Draw results">
          <div class="empty">No numbers have been drawn yet.</div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const drawButton = document.querySelector("#drawButton");
    const copyButton = document.querySelector("#copyButton");
    const resetButton = document.querySelector("#resetButton");
    const themeButton = document.querySelector("#themeButton");
    const gameCount = document.querySelector("#gameCount");
    const drawDisplay = document.querySelector("#drawDisplay");
    const results = document.querySelector("#results");
    const status = document.querySelector("#status");

    let currentGames = [];

    function getBallClass(number) {
      if (number <= 10) return "yellow";
      if (number <= 20) return "blue";
      if (number <= 30) return "red";
      if (number <= 40) return "gray";
      return "green";
    }

    function createBall(number, index = 0) {
      const ball = document.createElement("span");
      ball.className = `ball ${getBallClass(number)}`;
      ball.textContent = number;
      ball.style.animationDelay = `${index * 45}ms`;
      return ball;
    }

    function drawNumbers() {
      const pool = Array.from({ length: 45 }, (_, index) => index + 1);
      const picked = [];

      while (picked.length < 6) {
        const randomIndex = Math.floor(Math.random() * pool.length);
        picked.push(pool.splice(randomIndex, 1)[0]);
      }

      return picked.sort((a, b) => a - b);
    }

    function renderLatest(numbers) {
      drawDisplay.replaceChildren(...numbers.map(createBall));
    }

    function renderResults() {
      if (currentGames.length === 0) {
        results.innerHTML = '<div class="empty">No numbers have been drawn yet.</div>';
        return;
      }

      const fragment = document.createDocumentFragment();

      currentGames.forEach((numbers, gameIndex) => {
        const row = document.createElement("article");
        row.className = "game";

        const title = document.createElement("div");
        title.className = "game-title";
        title.textContent = `Game ${gameIndex + 1}`;

        const numberGroup = document.createElement("div");
        numberGroup.className = "numbers";
        numbers.forEach((number, index) => numberGroup.append(createBall(number, index)));

        row.append(title, numberGroup);
        fragment.append(row);
      });

      results.replaceChildren(fragment);
    }

    function drawGames() {
      const count = Number(gameCount.value);
      currentGames = Array.from({ length: count }, drawNumbers);
      renderLatest(currentGames[0]);
      renderResults();
      status.textContent = `${count} ${count === 1 ? "game" : "games"} generated.`;
    }

    async function copyResults() {
      if (currentGames.length === 0) {
        status.textContent = "There are no draw results to copy.";
        return;
      }

      const text = currentGames
        .map((numbers, index) => `Game ${index + 1}: ${numbers.join(", ")}`)
        .join("\n");

      try {
        await navigator.clipboard.writeText(text);
        status.textContent = "Draw results copied to the clipboard.";
      } catch {
        status.textContent = "Copy failed because the browser blocked clipboard access.";
      }
    }

    function resetGames() {
      currentGames = [];
      drawDisplay.innerHTML = Array.from({ length: 6 }, () => '<span class="ball pending">?</span>').join("");
      renderResults();
      status.textContent = "";
    }

    function toggleTheme() {
      const isDark = document.body.classList.toggle("dark");
      themeButton.textContent = isDark ? "Light mode" : "Dark mode";
      themeButton.setAttribute("aria-pressed", String(isDark));
    }

    drawButton.addEventListener("click", drawGames);
    copyButton.addEventListener("click", copyResults);
    resetButton.addEventListener("click", resetGames);
    themeButton.addEventListener("click", toggleTheme);
  </script>
</body>
</html>
