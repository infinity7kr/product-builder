<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 추천기</title>

<style>
:root{
    --page-bg:#f5f5f5;
    --panel-bg:#ffffff;
    --text:#2c3e50;
    --muted:#4b5f73;
    --set-bg:#fafafa;
    --set-border:#ddd;
    --shadow:rgba(0,0,0,.15);
    --switch-bg:#95a5a6;
    --switch-active:#2c3e50;
    --primary:#3498db;
    --primary-hover:#217dbb;
}

body{
    font-family:'맑은 고딕',sans-serif;
    background:var(--page-bg);
    color:var(--text);
    text-align:center;
    padding:40px;
    transition:background .3s,color .3s;
}

.container{
    max-width:900px;
    margin:auto;
    background:var(--panel-bg);
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px var(--shadow);
    transition:background .3s,box-shadow .3s;
}

h1{
    color:var(--text);
}

p,h3{
    color:var(--muted);
}

button{
    margin:20px;
    padding:15px 40px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:var(--primary-hover);
}

.set{
    margin:20px 0;
    padding:15px;
    background:var(--set-bg);
    border-radius:10px;
    border:1px solid var(--set-border);
    transition:background .3s,border-color .3s;
}

.ball{
    display:inline-flex;
    width:45px;
    height:45px;
    border-radius:50%;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:bold;
    margin:5px;
    font-size:18px;
}

.yellow{background:#f1c40f;}
.blue{background:#3498db;}
.red{background:#e74c3c;}
.gray{background:#7f8c8d;}
.green{background:#27ae60;}
</style>

</head>
<body>

<div class="container">

<h1 id="title">🎲 로또 번호 추천기</h1>

<p id="desc">버튼을 누르면 번호 5세트가 생성됩니다.</p>

<button onclick="makeLotto()" id="btn-generate">번호 추천받기</button>

<div id="result"></div>

</div>

<script>

function createNumbers(){

    let nums=[];

    while(nums.length<6){

        let n=Math.floor(Math.random()*45)+1;

        if(!nums.includes(n)){
            nums.push(n);
        }

    }

    nums.sort((a,b)=>a-b);

    return nums;
}

function color(num){

    if(num<=10) return "yellow";
    if(num<=20) return "blue";
    if(num<=30) return "red";
    if(num<=40) return "gray";
    return "green";
}

function makeLotto(){

    let html="";

    for(let i=1;i<=5;i++){

        let numbers=createNumbers();

        html+=`<div class="set">
        <h3>${i}번째 추천번호</h3>`;

        numbers.forEach(n=>{

            html+=`<span class="ball ${color(n)}">${n}</span>`;

        });

        html+="</div>";
    }

    document.getElementById("result").innerHTML=html;

}

makeLotto();

</script>

</body>
</html>
